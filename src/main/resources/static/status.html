<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankMart — Track My Application</title>
    <style>
        :root {
            --primary: #004d99;
            --secondary: #e6f0fa;
            --text-dark: #333333;
            --text-light: #666666;
            --background: #f8fafc;
            --white: #ffffff;
            --accent: #2e8b57;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; background-color: var(--background); color: var(--text-dark);
        }
        header {
            background-color: var(--primary); color: var(--white);
            padding: 1.5rem 2rem; display: flex;
            justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 1.8rem; }
        header nav a {
            color: rgba(255,255,255,0.8); text-decoration: none;
            margin-left: 1.5rem; font-size: 0.9rem;
            transition: color 0.2s;
        }
        header nav a:hover { color: white; }
        main {
            max-width: 700px; margin: 3rem auto; padding: 0 2rem;
        }
        h2 { color: var(--primary); margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-light); margin-bottom: 2rem; }
        .search-box {
            display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
        }
        .search-box input {
            flex: 1; padding: 0.75rem 1rem;
            border: 2px solid #cbd5e0; border-radius: 8px;
            font-size: 1rem;
        }
        .search-box button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary); color: white;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        .search-box button:hover { background-color: #003d7a; }
        .result-card {
            background: var(--white); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }
        .result-card h3 { margin: 0 0 0.5rem; color: var(--primary); }
        .result-card p { margin: 0.3rem 0; color: var(--text-light); font-size: 0.9rem; }
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }
        .status-PENDING_PAYMENT  { background: #fef3c7; color: #92400e; }
        .status-APPROVED  { background: #d1fae5; color: #065f46; }
        .status-REJECTED  { background: #fee2e2; color: #b91c1c; }
        .status-UNDER_REVIEW { background: #ede9fe; color: #5b21b6; }
        .message { text-align: center; padding: 2rem; color: var(--text-light); font-style: italic; }
        .error { color: #b91c1c; }
    </style>
</head>
<body>
    <header>
        <h1>🏦 BankMart</h1>
        <nav>
            <a href="/index.html">← Back to Products</a>
            <a href="/admin.html">Admin</a>
        </nav>
    </header>

    <main>
        <h2>Track My Application</h2>
        <p class="subtitle">
            Enter the email you used when you applied to see the status of your applications.
        </p>

        <div class="search-box">
            <input type="email" id="emailInput" placeholder="e.g. john@example.com"
                   onkeypress="if(event.key==='Enter') trackApplications()">
            <button onclick="trackApplications()">Track</button>
        </div>

        <div id="results">
            <!-- Results will appear here after searching -->
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';

        function trackApplications() {
            const email = document.getElementById('emailInput').value.trim();
            const resultsEl = document.getElementById('results');

            if (!email) {
                resultsEl.innerHTML = '<p class="message error">Please enter your email address.</p>';
                return;
            }

            resultsEl.innerHTML = '<p class="message">Looking up your applications...</p>';

            fetch(`${API_BASE_URL}/applications/track?email=${encodeURIComponent(email)}`)
                .then(res => {
                    if (res.status === 404) throw new Error('no_results');
                    if (!res.ok) throw new Error('server_error');
                    return res.json();
                })
                .then(applications => {
                    // Build a card for each application found
                    let html = `<p style="color:var(--text-light);margin-bottom:1rem;">
                        Found <strong>${applications.length}</strong> application(s) for <strong>${email}</strong>:
                    </p>`;
                    applications.forEach(app => {
                        html += `
                            <div class="result-card">
                                <h3>${app.productName}</h3>
                                <p>Application ID: <strong>#${app.id}</strong></p>
                                <p>Name: ${app.customerName}</p>
                                <p>Submitted: ${app.createdAt}</p>
                                <span class="status-badge status-${app.status}">${app.status.replace('_', ' ')}</span>
                            </div>
                        `;
                    });
                    resultsEl.innerHTML = html;
                })
                .catch(err => {
                    if (err.message === 'no_results') {
                        resultsEl.innerHTML = '<p class="message error">No applications found for that email. Double-check the email you used when applying.</p>';
                    } else {
                        resultsEl.innerHTML = '<p class="message error">Error connecting to the server. Make sure the backend is running.</p>';
                    }
                });
        }
    </script>
</body>
</html>
